set-option -sa terminal-overrides ",xterm*:Tc"

# Change prefix
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# Allow to scroll with mouse
set -g mouse on

# Autoreload tmux config
set-option -g @tmux-autoreload-configs '~/.config/tmux/tmux.conf'

# Windows starting value at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
# set -g status-style 'bg=#333333 fg=#5eacd3'
# set -gq allow-passthrough on
# set -s default-terminal 'tmux-256color'
# set -g @plugin 'dracula/tmux'
set -g @plugin 'omerxx/catppuccin-tmux' # My fork that holds the meetings script bc I'm lazy af
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha

set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory" # date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"

# Set vi-mode
set-window-option -g mode-keys vi
set -g mode-keys vi

# Bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind-key j select-pane -D
bind-key h select-pane -L
bind-key k select-pane -U
bind-key l select-pane -R


bind-key -r f run-shell "$HOME/dots/bin/tmux-sessionizer"
bind-key s display-popup -E "$HOME/dots/bin/tmux-switch.sh"
bind-key K display-popup -E "$HOME/dots/bin/tmux-kill-session.sh"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -n M-H previous-window
bind -n M-L next-window
bind p last-window
bind P switch-client -l

run-shell '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
run "$HOME/dots/tmux/plugins/tpm/tpm"
